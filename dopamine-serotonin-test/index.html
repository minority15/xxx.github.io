<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c10" />
  <meta name="description" content="5つのYES・NOで、セロトニンおじさん／セロガキ／ドパおじ／ドパガキのどれかを判定するエンタメ診断です。" />
  <meta property="og:title" content="あなたは何タイプ？ ドパ・セロ診断" />
  <meta property="og:description" content="5問のYES・NOで4タイプに分類。セロトニンおじさん、セロガキ、ドパおじ、ドパガキ。" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <title>ドパ・セロ診断｜5問で4タイプ判定</title>
  <style>
    :root {--bg:#090a0d;--panel:#14161c;--text:#f7f7f8;--muted:#a7abb6;--yes:#ff3b30;--no:#3478f6;--accent:#ffd60a;--radius:24px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,#252937 0,#0d0f14 42%,#090a0d 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}body{display:flex;justify-content:center;padding:18px 14px 40px}button{font:inherit}.app{width:min(100%,620px)}.brand{display:flex;align-items:center;gap:10px;margin:6px 4px 18px;color:var(--muted);font-weight:800;letter-spacing:.02em}.brand-mark{display:grid;place-items:center;width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#ffd60a,#ff8a00);color:#111;font-size:21px;box-shadow:0 8px 28px rgba(255,174,0,.24)}.card{background:linear-gradient(180deg,rgba(26,29,37,.98),rgba(16,18,23,.98));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:0 24px 70px rgba(0,0,0,.38);overflow:hidden}.screen{display:none;padding:30px 22px 26px;min-height:600px}.screen.active{display:flex;flex-direction:column}.hero{padding-top:34px;text-align:center}.kicker{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;background:#242832;color:#d7d9df;font-size:13px;font-weight:800}h1{font-size:clamp(34px,9vw,54px);line-height:1.08;margin:22px 0 12px;letter-spacing:-.045em}.lead{margin:0 auto;color:var(--muted);font-size:16px;line-height:1.8;max-width:460px}.types{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:28px 0 30px}.type-mini{padding:14px 10px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:14px;font-weight:900}.type-mini:nth-child(1){color:#b9f6ca}.type-mini:nth-child(2){color:#ffe082}.type-mini:nth-child(3){color:#ff9e99}.type-mini:nth-child(4){color:#8fbdff}.primary{border:0;border-radius:16px;background:var(--accent);color:#111;font-weight:950;font-size:18px;padding:17px 20px;cursor:pointer;box-shadow:0 12px 30px rgba(255,214,10,.18);transition:transform .12s ease,filter .12s ease}.primary:active,.answer:active,.secondary:active{transform:scale(.98)}.fine{margin:14px 0 0;color:#747987;font-size:12px;line-height:1.6;text-align:center}.quiz-head{display:flex;justify-content:space-between;align-items:center;gap:14px}.count{font-weight:950;font-size:14px;color:var(--accent);letter-spacing:.08em}.progress{height:8px;flex:1;background:#292d36;border-radius:99px;overflow:hidden}.progress>span{display:block;height:100%;width:20%;background:linear-gradient(90deg,#ffd60a,#ff8a00);border-radius:99px;transition:width .28s ease}.question-wrap{display:flex;flex:1;align-items:center;justify-content:center;text-align:center;padding:30px 4px}.question{font-size:clamp(25px,7vw,37px);line-height:1.45;font-weight:950;letter-spacing:-.025em;margin:0}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answer{border:0;border-radius:18px;padding:19px 10px;color:white;font-size:19px;font-weight:950;cursor:pointer;transition:transform .12s ease,filter .12s ease}.answer.yes{background:linear-gradient(135deg,#ff453a,#d71920)}.answer.no{background:linear-gradient(135deg,#438cff,#165ad8)}.back{align-self:center;border:0;background:transparent;color:#7f8490;padding:16px;cursor:pointer}.result-head{text-align:center}.result-badge{display:inline-block;padding:7px 12px;border-radius:999px;background:#2a2e38;color:#d3d6de;font-size:13px;font-weight:900}.result-title{font-size:clamp(34px,9vw,52px);line-height:1.12;margin:15px 0 10px;letter-spacing:-.04em}.result-copy{font-size:17px;line-height:1.8;color:#d8dae0;margin:0 auto;max-width:490px}.meter-box{margin:24px 0 18px;padding:18px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}.meter-row{display:grid;grid-template-columns:84px 1fr 84px;align-items:center;gap:9px;margin:11px 0;font-size:12px;font-weight:900;color:#adb1bb}.meter-row span:last-child{text-align:right}.meter{height:10px;border-radius:99px;background:#30343d;overflow:hidden;position:relative}.meter i{position:absolute;top:0;bottom:0;left:50%;width:0;background:linear-gradient(90deg,#ffd60a,#ff453a);transition:width .5s ease}.meter.reverse i{left:auto;right:50%;background:linear-gradient(90deg,#3478f6,#72e2a0)}.result-list{margin:0 0 24px;padding:0;list-style:none;display:grid;gap:10px}.result-list li{padding:13px 15px;border-radius:14px;background:#20232b;color:#e6e7eb;font-weight:750;line-height:1.55}.actions{display:grid;gap:10px;margin-top:auto}.secondary{border:1px solid #3a3f4a;border-radius:16px;background:#20232a;color:white;font-weight:900;font-size:16px;padding:15px;cursor:pointer}.share{background:#f5f5f5;color:#111;border-color:#f5f5f5}.footer{text-align:center;color:#656a76;font-size:12px;margin-top:14px}@media (max-width:420px){.screen{min-height:570px;padding:24px 18px 22px}.question{font-size:27px}.meter-row{grid-template-columns:74px 1fr 74px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="brand"><span class="brand-mark">⚡</span><span>ドパ・セロ診断</span></div>
    <section class="card">
      <div id="start" class="screen active hero">
        <span class="kicker">5問・約30秒</span><h1>あなたは<br>何タイプ？</h1>
        <p class="lead">YES・NOで答えるだけ。刺激を求める「ドーパミン型」か、安心を求める「セロトニン型」か。さらに「おじ／ガキ」まで判定します。</p>
        <div class="types"><div class="type-mini">🌿 セロトニンおじさん</div><div class="type-mini">🌼 セロガキ</div><div class="type-mini">🔥 ドパおじ</div><div class="type-mini">⚡ ドパガキ</div></div>
        <button class="primary" id="startBtn">診断をはじめる</button><p class="fine">※医学・心理学的な診断ではなく、SNS向けのエンタメ診断です。</p>
      </div>
      <div id="quiz" class="screen">
        <div class="quiz-head"><span class="count" id="count">Q1 / 5</span><div class="progress"><span id="bar"></span></div></div>
        <div class="question-wrap"><h2 class="question" id="question"></h2></div>
        <div class="answers"><button class="answer yes" data-answer="yes">YES</button><button class="answer no" data-answer="no">NO</button></div>
        <button class="back" id="backBtn">← ひとつ戻る</button>
      </div>
      <div id="result" class="screen">
        <div class="result-head"><span class="result-badge">診断結果</span><h2 class="result-title" id="resultTitle"></h2><p class="result-copy" id="resultCopy"></p></div>
        <div class="meter-box"><div class="meter-row"><span>セロトニン</span><div class="meter reverse"><i id="seroMeter"></i><i id="dopaMeter"></i></div><span>ドーパミン</span></div><div class="meter-row"><span>おじ</span><div class="meter reverse"><i id="ojiMeter"></i><i id="gakiMeter"></i></div><span>ガキ</span></div></div>
        <ul class="result-list" id="resultList"></ul>
        <div class="actions"><button class="secondary share" id="shareBtn">結果をXで共有</button><button class="secondary" id="retryBtn">もう一度診断する</button></div>
      </div>
    </section><div class="footer">© ドパ・セロ診断</div>
  </main>
<script>
const questions=['臨時収入が1万円入ったら、貯金よりパチンコ・競馬・仮想通貨で増やしたい。','負けているときほど、「次こそ当たる」と熱くなってしまう。','話題の店・アプリ・投資先は、よく分からなくても先に試したい。','若者の流行を見ると、「昔の方がよかった」と思うことが多い。','カナダはアメリカだ。'];
const results={serotoninOji:{title:'セロトニンおじさん',copy:'一発逆転より、今日も無事に終わることが大事。刺激に振り回されず、自分のペースと安心できる居場所を守るタイプです。',traits:['勝つことより、負けないことを重視','家族・仲間・日常の小さな幸福が大切','流行より「自分に合うか」で判断する']},serotoninGaki:{title:'セロガキ',copy:'若さと好奇心はあるけれど、争いや一発勝負はちょっと苦手。新しいものを楽しみつつ、心の安全地帯もしっかり確保するタイプです。',traits:['流行には乗るが、無茶な勝負はしない','人の気持ちや空気の変化に敏感','自分らしく、マイペースに楽しみたい']},dopamineOji:{title:'ドパおじ',copy:'刺激も結果も欲しい。ただし、勢いだけでは動かない。経験・データ・期待値を武器に、勝てる勝負を探し続けるタイプです。',traits:['パチンコも競馬も投資も「期待値」で見る','数字・成果・勝敗が強いモチベーション','ときどき勢いで国境まで広げる']},dopamineGaki:{title:'ドパガキ',copy:'新台、新馬、草コイン、最新トレンド。一番乗りと一発逆転に心が躍る、生粋の刺激追求型です。止められるほど燃えます。',traits:['「今しかない」にとても弱い','負けず嫌いで、勝つまでやりたくなる','考えるより先に試して経験から学ぶ']}};
let index=0,answers=[];const $=id=>document.getElementById(id);function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}function renderQuestion(){$('count').textContent=`Q${index+1} / ${questions.length}`;$('bar').style.width=`${((index+1)/questions.length)*100}%`;$('question').textContent=questions[index];$('backBtn').style.visibility=index===0?'hidden':'visible'}function score(){let dopamine=0,gaki=0;dopamine+=answers[0]==='yes'?2:-2;dopamine+=answers[1]==='yes'?2:-2;gaki+=answers[2]==='yes'?2:-2;gaki+=answers[3]==='yes'?-2:2;dopamine+=answers[4]==='yes'?1:-1;gaki+=answers[4]==='yes'?-1:1;return{dopamine,gaki}}function showResult(){const{dopamine,gaki}=score(),dopa=dopamine>0,young=gaki>0,key=dopa?(young?'dopamineGaki':'dopamineOji'):(young?'serotoninGaki':'serotoninOji'),r=results[key];$('resultTitle').textContent=r.title;$('resultCopy').textContent=r.copy;$('resultList').innerHTML=r.traits.map(t=>`<li>✓ ${t}</li>`).join('');const dopaPct=Math.round(((dopamine+5)/10)*100),gakiPct=Math.round(((gaki+5)/10)*100);$('dopaMeter').style.left='50%';$('dopaMeter').style.right='auto';$('dopaMeter').style.width=`${Math.max(0,dopaPct-50)*2}%`;$('seroMeter').style.width=`${Math.max(0,50-dopaPct)*2}%`;$('gakiMeter').style.left='50%';$('gakiMeter').style.right='auto';$('gakiMeter').style.width=`${Math.max(0,gakiPct-50)*2}%`;$('ojiMeter').style.width=`${Math.max(0,50-gakiPct)*2}%`;$('shareBtn').onclick=()=>{const text=`私の診断結果は「${r.title}」でした。\n5問でわかるドパ・セロ診断👇\n${location.href}`;window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank','noopener')};showScreen('result')}
$('startBtn').addEventListener('click',()=>{index=0;answers=[];renderQuestion();showScreen('quiz')});document.querySelectorAll('.answer').forEach(btn=>{btn.addEventListener('click',()=>{answers[index]=btn.dataset.answer;if(index<questions.length-1){index++;renderQuestion()}else showResult()})});$('backBtn').addEventListener('click',()=>{if(index>0){index--;answers.pop();renderQuestion()}});$('retryBtn').addEventListener('click',()=>{index=0;answers=[];renderQuestion();showScreen('quiz')});
</script>
</body></html>
